<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OrcaHub — Procurement Hub</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Spline+Sans:wght@400;500;600&display=swap');
  :root{--ink:#13233f;--navy:#1f3a6e;--navy-d:#15294f;--navy-l:#e6ecf6;--sand:#f4f5f8;--paper:#fff;--line:#dde3ee;--orange:#f08a24;--orange-l:#fdeede;--red:#c0392b;--red-l:#fbe9e7;--green:#1e8449;--green-l:#e6f4ec;--grey:#6b7585;--purple:#7d52d6;--purple-l:#ece7fb;--shadow:0 1px 3px rgba(19,35,63,.08),0 8px 24px rgba(19,35,63,.06);}
  [data-theme="dark"]{--ink:#e2e8f0;--navy:#60a5fa;--navy-d:#3b82f6;--navy-l:#1e3a5f;--sand:#0f172a;--paper:#1e293b;--line:#334155;--orange:#f59e0b;--orange-l:#2d1f0a;--red:#f87171;--red-l:#2d1010;--green:#4ade80;--green-l:#0f2d1a;--grey:#94a3b8;--purple:#a78bfa;--purple-l:#1e1535;--shadow:0 1px 3px rgba(0,0,0,.3),0 8px 24px rgba(0,0,0,.25);}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Spline Sans',sans-serif;background:var(--sand);color:var(--ink);line-height:1.5;-webkit-font-smoothing:antialiased}
  h1,h2,h3,h4{font-family:'Sora',sans-serif;font-weight:700;letter-spacing:-.02em}
  button{font-family:inherit;cursor:pointer;border:none}
  input,select,textarea{font-family:inherit;font-size:14px}
  #login{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:radial-gradient(120% 120% at 80% 0%,#1f3a6e 0%,#15294f 45%,#0c1a35 100%);z-index:100;padding:20px}
  .login-card{background:var(--paper);border-radius:20px;padding:44px 40px;width:100%;max-width:410px;box-shadow:0 30px 80px rgba(0,0,0,.3)}
  .logo{display:flex;align-items:center;gap:11px;margin-bottom:6px}
  .logo-mark{width:42px;height:42px;border-radius:11px;background:linear-gradient(135deg,#0ea5e9,#0284c7);display:grid;place-items:center;color:#fff;font-family:'Sora';font-weight:800;font-size:20px}
  .logo-txt{font-family:'Sora';font-weight:800;font-size:22px}.logo-txt span{color:var(--orange)}
  .login-sub{color:var(--grey);font-size:13px;margin-bottom:28px}
  .fld{margin-bottom:16px}.fld label{display:block;font-size:12px;font-weight:600;margin-bottom:6px;font-family:'Sora'}
  .fld input,.fld select{width:100%;padding:12px 14px;border:1.5px solid var(--line);border-radius:10px;background:#fff;transition:.2s}
  .fld input:focus,.fld select:focus{outline:none;border-color:var(--navy);box-shadow:0 0 0 3px var(--navy-l)}
  .btn{padding:12px 18px;border-radius:10px;font-weight:600;font-family:'Sora';font-size:14px;transition:.18s}
  .btn-primary{background:var(--navy);color:#fff;width:100%}.btn-primary:hover{background:var(--navy-d)}
  .btn-orange{background:var(--orange);color:#fff}.btn-orange:hover{filter:brightness(.95)}
  .role-pick{display:flex;gap:8px;margin-bottom:18px}
  .role-pick button{flex:1;padding:11px;border:1.5px solid var(--line);border-radius:10px;background:#fff;font-weight:600;font-size:13px;color:var(--grey);font-family:'Sora'}
  .role-pick button.on{border-color:var(--navy);background:var(--navy-l);color:var(--navy)}
  #app{display:none;min-height:100vh}
  .topbar{background:var(--paper);border-bottom:1px solid var(--line);padding:0 24px;height:62px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
  .topbar .logo-txt{font-size:18px}.topbar .logo-mark{width:34px;height:34px;font-size:16px;border-radius:9px}
  .who{display:flex;align-items:center;gap:14px;font-size:13px}
  .who .badge{background:var(--navy-l);color:var(--navy);padding:5px 11px;border-radius:20px;font-weight:600;font-size:12px;font-family:'Sora'}
  .who button{background:none;color:var(--grey);font-size:13px;text-decoration:underline}
  .bell{position:relative;cursor:pointer;font-size:20px}
  .bell .dot{position:absolute;top:-4px;right:-5px;background:var(--red);color:#fff;font-size:10px;font-weight:700;min-width:16px;height:16px;border-radius:9px;display:grid;place-items:center;font-family:'Sora';padding:0 3px}
  .wrap{max-width:1300px;margin:0 auto;padding:28px 24px 60px}
  .shell{display:flex;min-height:calc(100vh - 62px)}
  .sidebar{width:230px;background:var(--paper);border-right:1px solid var(--line);padding:18px 12px;display:flex;flex-direction:column;position:sticky;top:62px;height:calc(100vh - 62px);flex-shrink:0}
  .sidebar nav{flex:1;display:flex;flex-direction:column;gap:3px}
  .side-link{display:flex;align-items:center;gap:11px;padding:11px 14px;border-radius:10px;font-family:'Sora';font-weight:600;font-size:14px;color:var(--grey);background:none;cursor:pointer;text-align:left;width:100%;transition:.15s;position:relative}
  .side-link:hover{background:var(--navy-l);color:var(--navy)}
  .side-link.on{background:var(--navy);color:#fff}
  .side-link .ic{font-size:17px;width:22px;text-align:center}
  .side-link .nb{position:absolute;right:12px;background:var(--orange);color:#fff;font-size:10px;padding:1px 7px;border-radius:9px}
  .side-link.on .nb{background:#fff;color:var(--navy)}
  .side-sect{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:#aab;font-family:'Sora';font-weight:700;padding:12px 14px 5px}
  .theme-toggle-bar{display:flex;gap:4px;padding:8px 0;margin-top:8px}.theme-btn-side{flex:1;padding:7px;border-radius:8px;font-family:'Sora';font-weight:700;font-size:11px;background:none;color:var(--grey);border:1.5px solid var(--line);cursor:pointer;transition:.15s;letter-spacing:.04em}.theme-btn-side.on{background:var(--navy);color:#fff;border-color:var(--navy)}  .side-logout{margin-top:8px;padding:11px 14px;border-radius:10px;font-family:'Sora';font-weight:600;font-size:13px;color:var(--red);background:var(--red-l);cursor:pointer;text-align:center}
  .main{flex:1;min-width:0}
  .main .wrap{max-width:1180px}
  .hamb{display:none;background:none;font-size:22px;color:var(--ink);cursor:pointer;line-height:1}
  .side-overlay{display:none;position:fixed;inset:62px 0 0 0;background:rgba(19,35,63,.4);z-index:40}
  @media(max-width:900px){
    .sidebar{position:fixed;left:0;top:62px;z-index:45;transform:translateX(-100%);transition:.25s;box-shadow:8px 0 30px rgba(0,0,0,.15)}
    .sidebar.open{transform:translateX(0)}
    .side-overlay.show{display:block}
    .hamb{display:block}
  }
  .page-head{margin-bottom:22px}.page-head h2{font-size:26px;margin-bottom:3px}.page-head p{color:var(--grey);font-size:14px}
  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:26px}
  .kpi{background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:18px 20px;box-shadow:var(--shadow);position:relative;overflow:hidden}
  .kpi::after{content:'';position:absolute;right:-20px;top:-20px;width:70px;height:70px;border-radius:50%;opacity:.1}
  .kpi.n::after{background:var(--navy)}.kpi.o::after{background:var(--orange)}.kpi.r::after{background:var(--red)}.kpi.g::after{background:var(--green)}.kpi.p::after{background:var(--purple)}
  .kpi .lbl{font-size:12px;color:var(--grey);font-weight:600;text-transform:uppercase;letter-spacing:.04em;font-family:'Sora'}
  .kpi .val{font-size:32px;font-family:'Sora';font-weight:800;margin-top:6px;line-height:1}
  .tabs{display:flex;gap:4px;margin-bottom:18px;background:#e7eaf1;padding:4px;border-radius:11px;width:fit-content;flex-wrap:wrap}
  .tabs button{padding:9px 16px;border-radius:8px;font-weight:600;font-size:13px;color:var(--grey);background:none;font-family:'Sora';transition:.15s;position:relative}
  .tabs button.on{background:var(--paper);color:var(--ink);box-shadow:var(--shadow)}
  .tabs .nb{background:var(--red);color:#fff;font-size:10px;padding:1px 6px;border-radius:8px;margin-left:5px}
  .card{background:var(--paper);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);overflow:hidden;margin-bottom:18px}
  .card-h{padding:16px 20px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
  .card-h h3{font-size:16px}
  table{width:100%;border-collapse:collapse}
  th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--grey);font-family:'Sora';font-weight:600;padding:11px 14px;background:#f7f8fb;border-bottom:1px solid var(--line)}
  td{padding:11px 14px;font-size:13.5px;border-bottom:1px solid var(--line);vertical-align:top}
  tr:last-child td{border-bottom:none}tbody tr:hover td{background:#f7f8fb}
  .pill{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600;font-family:'Sora'}
  .pill::before{content:'';width:6px;height:6px;border-radius:50%}
  .p-baru{background:var(--orange-l);color:#9a5912}.p-baru::before{background:var(--orange)}
  .p-proses{background:var(--navy-l);color:var(--navy)}.p-proses::before{background:var(--navy)}
  .p-siap{background:var(--green-l);color:#176b3a}.p-siap::before{background:var(--green)}
  .p-bo{background:var(--red-l);color:#a32d1f}.p-bo::before{background:var(--red)}
  .empty{padding:50px;text-align:center;color:var(--grey)}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;padding:22px}
  .form-grid .full{grid-column:1/-1}
  .form-grid textarea{width:100%;padding:12px 14px;border:1.5px solid var(--line);border-radius:10px;min-height:60px;resize:vertical}
  .form-grid input,.form-grid select{width:100%;padding:11px 14px;border:1.5px solid var(--line);border-radius:10px}
  .form-grid input:focus,.form-grid select:focus,.form-grid textarea:focus{outline:none;border-color:var(--navy);box-shadow:0 0 0 3px var(--navy-l)}
  .mini-cart{display:flex;flex-direction:column;gap:6px;margin-top:4px}
  .mini-row{display:flex;align-items:center;gap:8px;padding:8px 10px;background:#f7f8fb;border:1px solid var(--line);border-radius:9px}
  .mini-name{font-size:13px;font-weight:600;line-height:1.3;overflow-wrap:anywhere}
  .mini-sub{font-size:11px;color:var(--grey);display:flex;align-items:center;gap:4px;flex-wrap:wrap;margin-top:2px}
  .form-grid .mini-row input.mini-qty,.mini-qty{width:64px!important;flex:0 0 64px;padding:6px 8px;border:1.5px solid var(--line);border-radius:7px;font-size:13px;text-align:center}
  .mini-row>div:first-child{flex:1 1 auto;min-width:0}
  .mini-unit{font-size:11px;color:var(--grey);font-family:'Sora';font-weight:600}
  .mini-x{background:var(--red-l);color:var(--red);border-radius:7px;width:30px;height:30px;font-size:16px;font-weight:700;flex-shrink:0}
  .shop-pager{display:flex;justify-content:space-between;align-items:center;padding:14px 20px;border-top:1px solid var(--line);flex-wrap:wrap;gap:10px}
  .pgbar{display:flex;align-items:center;gap:4px;flex-wrap:wrap}
  .pgnum{min-width:32px;height:32px;border-radius:8px;border:1.5px solid var(--line);background:#fff;font-family:'Sora';font-weight:600;font-size:13px;color:var(--ink);cursor:pointer}
  .pgnum:hover{border-color:var(--navy);color:var(--navy)}
  .pgnum.on{background:var(--navy);color:#fff;border-color:var(--navy)}
  .pgnav{height:32px;padding:0 12px;border-radius:8px;border:1.5px solid var(--line);background:#fff;font-family:'Sora';font-weight:600;font-size:13px;color:var(--navy);cursor:pointer}
  .pgnav:hover:not([disabled]){background:var(--navy-l)}
  .pgnav[disabled]{opacity:.4;cursor:not-allowed;color:var(--grey)}
  .item-row{display:grid;grid-template-columns:2.4fr 1fr auto;gap:10px;margin-bottom:9px;align-items:center}
  .item-row button{background:var(--red-l);color:var(--red);border-radius:8px;width:38px;height:38px;font-size:18px;font-weight:700}
  .add-item{background:var(--orange-l);color:#9a5912;padding:9px 14px;border-radius:9px;font-weight:600;font-size:13px;font-family:'Sora'}
  .form-foot{padding:18px 22px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:10px}
  .btn-ghost{background:#fff;border:1.5px solid var(--line);color:var(--ink)}
  .act-btn{padding:6px 13px;border-radius:7px;font-size:12px;font-weight:600;font-family:'Sora';margin-right:5px;margin-bottom:4px}
  .act-proses{background:var(--navy);color:#fff}.act-view{background:var(--navy-l);color:var(--navy)}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--ink);color:#fff;padding:13px 22px;border-radius:11px;font-size:14px;font-weight:500;box-shadow:0 12px 40px rgba(0,0,0,.25);transition:.3s;z-index:300;opacity:0}
  .toast.show{transform:translateX(-50%) translateY(0);opacity:1}
  .filters{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .filters select,.filters input{padding:7px 11px;border:1.5px solid var(--line);border-radius:8px;font-size:13px;background:#fff}
  .badge-mini{font-size:11px;padding:2px 7px;border-radius:6px;background:var(--navy-l);color:var(--navy);font-weight:600;font-family:'Sora'}
  .badge-type{font-size:10px;padding:2px 7px;border-radius:6px;background:var(--orange-l);color:#9a5912;font-weight:600;font-family:'Sora'}
  .catalog-pick{max-height:300px;overflow:auto;border:1.5px solid var(--line);border-radius:10px;margin-top:6px}
  .cat-item{padding:9px 13px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;cursor:pointer;font-size:13px}
  .cat-item:hover{background:var(--navy-l)}.cat-item:last-child{border:none}.cat-item small{color:var(--grey)}
  .chk{width:17px;height:17px;accent-color:var(--navy);flex-shrink:0}
  .scroll-area{max-height:60vh;overflow:auto}
  .count-tag{font-size:12px;color:var(--grey);font-weight:500}
  .grp-head td{background:var(--navy)!important;color:#fff;font-family:'Sora';font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:.04em}
  /* popup notification */
  .popnote{position:fixed;top:74px;right:24px;width:340px;background:var(--paper);border:1px solid var(--line);border-left:5px solid var(--orange);border-radius:12px;box-shadow:0 18px 50px rgba(0,0,0,.18);padding:16px 18px;z-index:250;transform:translateX(400px);transition:.4s;opacity:0}
  .popnote.show{transform:translateX(0);opacity:1}
  .popnote h4{font-size:14px;margin-bottom:3px;display:flex;align-items:center;gap:7px}
  .popnote p{font-size:13px;color:var(--grey)}.popnote .ndot{width:9px;height:9px;border-radius:50%;background:var(--orange)}
  /* modal */
  .modal-bg{position:fixed;inset:0;background:rgba(19,35,63,.5);z-index:200;display:none;align-items:flex-start;justify-content:center;padding:40px 16px;overflow:auto}
  .modal-bg.show{display:flex}
  .modal{background:var(--paper);border-radius:16px;width:100%;max-width:760px;box-shadow:0 30px 80px rgba(0,0,0,.3)}
  .modal-h{padding:18px 22px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
  .modal-h h3{font-size:18px}.modal-h .x{font-size:24px;color:var(--grey);cursor:pointer;background:none}
  .modal-b{padding:22px}
  .doc-meta{display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:13px;margin-bottom:16px}
  .doc-meta b{font-family:'Sora'}
  .scan-box{background:var(--navy);border-radius:12px;padding:20px;text-align:center;color:#fff;margin-bottom:16px}
  .scan-box input{width:100%;max-width:340px;padding:13px 16px;border-radius:10px;border:none;font-size:16px;text-align:center;font-family:'Sora';letter-spacing:.05em}
  .scan-box p{font-size:12px;opacity:.8;margin-top:8px}
  .scan-sim{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-top:12px}
  .scan-sim button{background:rgba(255,255,255,.15);color:#fff;font-size:11px;padding:5px 9px;border-radius:7px;font-family:'Sora'}
  .pick-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--line);gap:10px}
  .pick-row:last-child{border:none}
  .pick-name{font-size:13.5px}.pick-name small{color:var(--grey)}
  .pick-qty{font-family:'Sora';font-weight:700;font-size:14px;white-space:nowrap}
  .pick-done{color:var(--green)}.pick-pending{color:var(--grey)}
  .pick-tick{width:26px;height:26px;border-radius:50%;display:grid;place-items:center;font-size:14px;flex-shrink:0}
  .tick-on{background:var(--green);color:#fff}.tick-off{background:#e7eaf1;color:var(--grey)}
  .bo-tag{background:var(--red-l);color:var(--red);font-size:11px;padding:2px 8px;border-radius:7px;font-weight:600;font-family:'Sora'}
  @media(max-width:760px){.kpis{grid-template-columns:repeat(2,1fr)}.form-grid{grid-template-columns:1fr}.doc-meta{grid-template-columns:1fr}.popnote{right:10px;width:calc(100% - 20px)}}
</style>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
</head>
<body>
<div id="login">
  <div class="login-card">
    <div class="logo"><div class="logo-mark">O</div><div class="logo-txt">Orca<span>Hub</span></div></div>
    <p class="login-sub">Procurement Hub · pintu depan untuk AutoCount</p><p id="diag" data-build="v25" style="font-size:11px;color:#9aa3b2;margin:-18px 0 22px;font-family:Sora"></p>
    <div class="role-pick"><button id="r-klinik" class="on" onclick="pickRole('klinik')">Klinik</button><button id="r-pusat" onclick="pickRole('pusat')">Pusat (HQ)</button></div>
    <div class="fld" id="clinicFld"><label>Pilih Klinik</label><select id="clinicSel"><option>KDMU</option><option>KDG</option><option>KDKP</option><option>KDDS</option><option>KDPG</option><option>KDB</option><option>KDSA</option><option>KDTM</option></select></div>
    <div class="fld"><label>Nama Anda</label><input id="userName" placeholder="cth: Siti / Ejat"></div>
    <div class="fld"><label>Kata Laluan</label><input id="userPass" type="password" placeholder="••••••" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <button class="btn btn-primary" onclick="doLogin()">Masuk Sistem</button>
  </div>
</div>
<div id="app">
  <div class="topbar"><div style="display:flex;align-items:center;gap:12px"><button class="hamb" onclick="toggleSidebar()">☰</button><div class="logo"><div class="logo-mark">O</div><div class="logo-txt">Orca<span>Hub</span></div></div></div>
    <div class="who"><span id="cartWrap" style="display:none" class="bell" onclick="navTo('cart')">🛒<span class="dot" id="cartDot" style="display:none">0</span></span>
    <span id="bellWrap" style="display:none" class="bell" onclick="navTo('orders')">🔔<span class="dot" id="bellDot" style="display:none">0</span></span>
    <span class="badge" id="whoBadge"></span><span id="whoName"></span><button onclick="logout()">Log Keluar</button><button onclick="toggleTheme()" id="themeBtn" style="background:none;font-size:18px;padding:4px 8px;border-radius:8px;border:1.5px solid var(--line);color:var(--ink);margin-left:4px" title="Toggle Dark/Light">🌙</button></div></div>
  <div class="shell">
    <aside class="sidebar" id="sidebar"><nav id="sideNav"></nav>
      <div class="theme-toggle-bar"><button class="theme-btn-side on" id="themeLightBtn" onclick="setTheme('light')">LIGHT</button><button class="theme-btn-side" id="themeDarkBtn" onclick="setTheme('dark')">DARK</button></div><button class="side-logout" onclick="logout()">⎋ Log Keluar</button></aside>
    <main class="main"><div class="wrap" id="content"></div></main>
  </div>
  <div class="side-overlay" id="sideOverlay" onclick="toggleSidebar()"></div></div>
</div>
<div class="popnote" id="popnote"><h4><span class="ndot"></span> <span id="popTitle">Order Baru</span></h4><p id="popBody"></p></div>
<div class="modal-bg" id="modalBg"><div class="modal"><div class="modal-h"><h3 id="modalTitle">Proses Order</h3><button class="x" onclick="closeModal()">×</button></div><div class="modal-b" id="modalBody"></div></div></div>
<div class="toast" id="toast"></div>
<script>
const CLINICS=["KDMU","KDG","KDKP","KDDS","KDPG","KDB","KDSA","KDTM"];
// ===== KATA LALUAN DEFAULT (tukar di sini bila perlu) =====
// Setiap klinik password sendiri + HQ password sendiri.
const COMPANY={
  name:'BRILLIANT PHARMA SDN BHD', reg:'202101035119',
  addr:'No 33, Lorong Perusahaan Ringan 1,<br>Lorong Perusahaan Ringan, 68100 Batu Caves,<br>Selangor Darul Ehsan',
  poAddr:'69-G, Jalan Prima SG 3, Prima Seri Gombak, 68100 Batu Caves, Selangor',
  tel:'017-8910 112', email:'brilliantpharma@gmail.com',
  bankName:'MAYBANK', bankAcc:'XXXXXXXXXXXXXX', bankPayee:'BRILLIANT PHARMA SDN BHD',

function ringgitWords(n){
  n=Math.round((parseFloat(n)||0)*100)/100;
  var ones=['','ONE','TWO','THREE','FOUR','FIVE','SIX','SEVEN','EIGHT','NINE','TEN','ELEVEN','TWELVE','THIRTEEN','FOURTEEN','FIFTEEN','SIXTEEN','SEVENTEEN','EIGHTEEN','NINETEEN'];
  var tens=['','','TWENTY','THIRTY','FORTY','FIFTY','SIXTY','SEVENTY','EIGHTY','NINETY'];
  function three(num){var r='';var h=Math.floor(num/100);var rem=num%100;
    if(h>0)r+=ones[h]+' HUNDRED'+(rem>0?' ':'');
    if(rem>0){if(rem<20)r+=ones[rem];else{r+=tens[Math.floor(rem/10)];if(rem%10>0)r+=' '+ones[rem%10];}}
    return r;}
  var ringgit=Math.floor(n);var sen=Math.round((n-ringgit)*100);
  if(ringgit===0&&sen===0)return 'ZERO ONLY';
  var parts='';var scales=[['BILLION',1000000000],['MILLION',1000000],['THOUSAND',1000]];var rem=ringgit;
  scales.forEach(function(sc){var unit=Math.floor(rem/sc[1]);if(unit>0){parts+=three(unit)+' '+sc[0]+' ';rem=rem%sc[1];}});
  if(rem>0)parts+=three(rem)+' ';
  parts=parts.trim();
  var out='RINGGIT MALAYSIA '+(parts||'ZERO');
  if(sen>0)out+=' AND '+three(sen)+' SEN';
  return out+' ONLY';
}

    try{ const v=localStorage.getItem(k); if(v!=null) return v; }catch(e){}

  },
  async set(k,v){
    let ok=false;

  }
};

async function loadPOData(){
  try{var r=await STORE.get(POKEY);POS=r?JSON.parse(r):[];}catch(e){POS=[];}
  try{var g=await STORE.get(GRNKEY);GRNS=g?JSON.parse(g):[];}catch(e){GRNS=[];}
  try{var s=await STORE.get(SUPKEY);SUPPLIERS=s?JSON.parse(s):[];}catch(e){SUPPLIERS=[];}
  try{var i=await STORE.get(IMGKEY);ITEMIMG=i?JSON.parse(i):{};}catch(e){ITEMIMG={};}
  try{var st=await STORE.get(STKEY);STAKES=st?JSON.parse(st):[];}catch(e){STAKES=[];}
  if(!SUPPLIERS.length)SUPPLIERS=defaultSuppliers();
  // migrasi: senarai lama = nama brand ubat auto-gen (cth DUOPHARMA, YSP) yang TIADA penanda syarikat.
  // Kalau majoriti supplier takde "SDN BHD/PLT/ENTERPRISE/MARKETING/CO." → reset ke senarai pharma sebenar.
  else{
    var hasCoSuffix=SUPPLIERS.filter(function(s){return /\b(SDN\.?\s*BHD|PLT|ENTERPRISE|MARKETING|TRADING|LOGISTICS|CO\.?\s*LTD|INDUSTRIES|GROUP)\b/i.test(s);}).length;
    if(hasCoSuffix < SUPPLIERS.length/2){SUPPLIERS=defaultSuppliers();await saveSuppliers();}
  }
}

async function loadAll(){
  try{const r=await STORE.get(KEY);DATA=r?JSON.parse(r):[];}catch(e){DATA=[];}
  try{const s=await STORE.get(SKEY);STOCK=s?JSON.parse(s):seedStock();}catch(e){STOCK=seedStock();}
  if(!Object.keys(STOCK).length){STOCK=seedStock();await saveStock();}
  try{const n=await STORE.get(NKEY);seenCount=n?JSON.parse(n):0;}catch(e){seenCount=0;}
  await loadPayments();
  await loadPOData();
  try{const u=await STORE.get(UKEY);if(u){const uom=JSON.parse(u);Object.keys(uom).forEach(sku=>{if(SKUMAP[sku]){var x=uom[sku];SKUMAP[sku].unit=x.unit;SKUMAP[sku].perCtn=x.perCtn;if(x.price!=null)SKUMAP[sku].price=x.price;if(x.disc!=null)SKUMAP[sku].disc=x.disc;if(x.markup!=null)SKUMAP[sku].markup=x.markup;if(x.exp!=null)SKUMAP[sku].exp=x.exp;}});}}catch(e){}
}

async function doLogin(){const nm=document.getElementById('userName').value.trim();if(!nm){toast('Sila isi nama anda');return;}
  const pass=(document.getElementById('userPass').value||'').trim();
  const key=session.role==='pusat'?'PUSAT':document.getElementById('clinicSel').value;
  if(pass!==PASSWORDS[key]){toast('❌ Kata laluan salah untuk '+(session.role==='pusat'?'Pusat (HQ)':key));return;}
  session.name=nm;session.clinic=document.getElementById('clinicSel').value;await loadAll();
  document.getElementById('login').style.display='none';document.getElementById('app').style.display='block';
  document.getElementById('whoName').textContent=session.name;document.getElementById('whoBadge').textContent=session.role==='pusat'?'Pusat (HQ)':session.clinic;
  document.getElementById('bellWrap').style.display=session.role==='pusat'?'block':'none';
  document.getElementById('cartWrap').style.display=session.role==='klinik'?'block':'none';
  curTab=session.role==='pusat'?'orders':'shop';render();
  if(session.role==='pusat'){startPolling();}
}

function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2400);}
function uid(p){return p+'-'+Date.now().toString().slice(-6)+Math.floor(Math.random()*9);}
function today(){return new Date().toISOString().slice(0,10);}
function nowt(){return new Date().toLocaleTimeString('ms-MY',{hour:'2-digit',minute:'2-digit'});}
const SKUMAP={};CATALOG.forEach(c=>SKUMAP[c.sku]=c);
function expSoonCount(){var n=0;CATALOG.forEach(c=>{var e=expStatus(c.exp);if(e&&e.days<=90)n++;});return n;}
function expStatus(dateStr){if(!dateStr)return null;var d=new Date(dateStr);if(isNaN(d))return null;var now=new Date();var days=Math.ceil((d-now)/(1000*60*60*24));
  if(days<0)return{t:'LUPUT',c:'p-bo',days:days};if(days<=90)return{t:'Hampir luput ('+days+'h)',c:'p-baru',days:days};return{t:'OK',c:'p-siap',days:days};}
function hargaKlinik(sku){var c=SKUMAP[sku];if(!c)return 0;var cost=parseFloat(c.price)||0;var disc=parseFloat(c.disc)||0;var mk=(c.markup!=null?parseFloat(c.markup):20);var net=cost*(1-disc/100);return net*(1+mk/100);}
function fmtRM(n){return 'RM'+(parseFloat(n)||0).toFixed(2);}
function orderTotal(o){if(!o||(o.status!=='proses'&&o.status!=='siap'))return 0;var t=0;(o.items||[]).filter(function(i){return !i.bo;}).forEach(function(it){var deliver=(it.gotQty!=null?it.gotQty:it.qty);var foc=it.foc||0;var bil=(parseInt(deliver)||0)-foc;var price=(it.price!=null?it.price:hargaKlinik(it.sku));t+=bil*price;});return t;}
var PAYMENTS={}; // {clinic:[{amt,date,note}]}
async function loadPayments(){try{var r=await STORE.get('bp_v3_pay');PAYMENTS=r?JSON.parse(r):{};}catch(e){PAYMENTS={};}}
async function savePayments(){try{await STORE.set('bp_v3_pay',JSON.stringify(PAYMENTS));}catch(e){}}
function clinicBilled(cl){var t=0;DATA.forEach(function(o){if(o.clinic===cl)t+=orderTotal(o);});return t;}
function clinicPaid(cl){var t=0;(PAYMENTS[cl]||[]).forEach(function(p){t+=parseFloat(p.amt)||0;});return t;}
function clinicBalance(cl){return clinicBilled(cl)-clinicPaid(cl);}
function stockStatus(sku){var n=STOCK[sku]||0;if(n<=0)return{t:'Takde Stok',c:'p-bo',ok:false};if(n<=10)return{t:'Stok Rendah',c:'p-baru',ok:true};return{t:'Ada Stok',c:'p-siap',ok:true};}
function skuInfo(sku){return SKUMAP[sku]||{name:sku,unit:'unit',type:'',cat:'',perCtn:1};}
function uomBreak(sku,qty){var inf=skuInfo(sku);var per=inf.perCtn||1;var q=parseInt(qty)||0;if(per<=1)return q+' '+inf.unit;var c=Math.floor(q/per);var r=q%per;var out=[];if(c>0)out.push(c+' CTN');if(r>0)out.push(r+' '+inf.unit);return out.length?out.join(' + '):'0 '+inf.unit;}

  if(kind==='bo')return DATA.reduce(function(a,o){return a+((o.backorder||[]).length);},0);

function startPolling(){clearInterval(window._poll);window._poll=setInterval(checkNew,2500);checkNew();}
async function checkNew(){
  try{const r=await STORE.get(KEY);DATA=r?JSON.parse(r):[];}catch(e){}
  const total=DATA.filter(x=>x.status==='baru').length;
  const dot=document.getElementById('bellDot');
  if(total>0){dot.style.display='grid';dot.textContent=total;}else{dot.style.display='none';}
  if(total>seenCount){const latest=DATA.filter(x=>x.status==='baru').slice(-1)[0];if(latest)showPop(latest);}
  seenCount=total;saveSeen();
  // refresh order tab live
  if(session.role==='pusat'&&curTab==='orders')renderPusat();
}
async function forceRefresh(){try{const r=await STORE.get(KEY);DATA=r?JSON.parse(r):[];}catch(e){}renderPusat();toast('↻ Dimuat semula — '+DATA.length+' rekod');}
function showPop(o){const p=document.getElementById('popnote');
  document.getElementById('popTitle').textContent='Order baru dari '+o.clinic;
  document.getElementById('popBody').textContent=o.items.length+' item · oleh '+o.by+' · '+(o.time||'');
  p.classList.add('show');setTimeout(()=>p.classList.remove('show'),5000);
  try{beep();}catch(e){}
}
function beep(){const a=new (window.AudioContext||window.webkitAudioContext)();const o=a.createOscillator();const g=a.createGain();o.connect(g);g.connect(a.destination);o.frequency.value=880;g.gain.value=.08;o.start();setTimeout(()=>{o.stop();a.close();},160);}

  const items=o.items.filter(i=>!i.bo);

    var foc=it.foc||0;var bil=deliver-foc;var price=(it.price!=null?it.price:hargaKlinik(it.sku));var amt=bil*price;total+=amt;

    '<tfoot><tr><td colspan="6" style="text-align:right;font-weight:700">JUMLAH</td><td style="font-weight:700">'+fmtRM(total)+'</td></tr></tfoot></table>'+
    (boRows?'<div style="margin-top:14px;font-family:Sora;font-weight:700;font-size:13px;color:var(--red)">Item Belum Dihantar (Back Order):</div><table style="border:1px solid var(--line);margin-top:6px"><thead><tr><th>Kod</th><th>Item</th><th>Qty</th></tr></thead><tbody>'+boRows+'</tbody></table>':'')+
    '<div style="display:flex;justify-content:space-between;margin-top:24px;gap:20px"><div style="flex:1;border-top:1px solid #999;padding-top:6px;font-size:12px">Received by (Klinik):<br><br>Nama & Tandatangan</div><div style="flex:1;border-top:1px solid #999;padding-top:6px;font-size:12px">Checked by (HQ):<br><br>Nama & Tandatangan</div></div>'+

  showModal('Invois '+o.inv+' — '+o.clinic,html);}

let sortBy='cat',catSearch='';
function renderCatalog(showStock){const b=document.getElementById('tabbody');
  b.innerHTML='<div class="card"><div class="card-h"><h3>Katalog Item <span class="count-tag">('+CATALOG.length+' item)</span></h3>'+
    '<div class="filters"><input placeholder="Cari nama/SKU..." value="'+catSearch+'" oninput="catSearch=this.value;drawCatalog('+showStock+')" style="min-width:200px">'+
    '<span style="font-size:12px;color:var(--grey);font-family:Sora;font-weight:600">Susun:</span>'+
    '<select onchange="sortBy=this.value;drawCatalog('+showStock+')"><option value="cat"'+(sortBy==="cat"?" selected":"")+'>Kategori</option><option value="type"'+(sortBy==="type"?" selected":"")+'>Item Type</option><option value="name"'+(sortBy==="name"?" selected":"")+'>Nama</option><option value="sku"'+(sortBy==="sku"?" selected":"")+'>Kod</option></select></div></div>'+
    '<div class="scroll-area" id="catScroll"></div></div>';drawCatalog(showStock);}
function drawCatalog(showStock){let list=CATALOG.slice();
  if(catSearch.trim()){const q=catSearch.toLowerCase();list=list.filter(c=>c.name.toLowerCase().includes(q)||c.sku.toLowerCase().includes(q)||c.cat.toLowerCase().includes(q)||c.type.toLowerCase().includes(q));}
  const keys=sortBy==='cat'?['cat','type','name']:sortBy==='type'?['type','cat','name']:sortBy==='sku'?['sku']:['name'];
  list.sort((a,b)=>{for(const k of keys){const c=(a[k]||'').toString().localeCompare((b[k]||'').toString(),'ms');if(c)return c;}return 0;});
  const grouped=sortBy==='cat'||sortBy==='type';let lastGrp=null;
  let html='<table><thead><tr><th>Kod</th><th>Gambar</th><th>Nama / Description</th><th>Unit</th><th>1 CTN</th>'+(showStock?'<th>Expired</th><th>Stok HQ (edit)</th>':'<th>Item Type</th>')+'</tr></thead><tbody>';
  list.forEach(it=>{if(grouped){const g=sortBy==='cat'?it.cat:it.type;if(g!==lastGrp){const cnt=list.filter(x=>(sortBy==='cat'?x.cat:x.type)===g).length;html+='<tr class="grp-head"><td colspan="'+(showStock?7:6)+'">'+g+' · '+cnt+' item</td></tr>';lastGrp=g;}}
    var es=showStock?expStatus(it.exp):null;var idc=it.sku.replace(/[^A-Za-z0-9]/g,"");var thumb=itemImg(it.sku);
    html+='<tr><td><span class="badge-mini">'+it.sku+'</span></td>'+
    '<td>'+(thumb?'<img src="'+thumb+'" style="width:40px;height:40px;object-fit:cover;border-radius:7px">':'<div style="width:40px;height:40px;border-radius:7px;background:#f0f2f7;display:flex;align-items:center;justify-content:center;font-size:15px">💊</div>')+'</td>'+
    '<td><b>'+it.name+'</b><br><span style="font-size:11px;color:var(--grey)">'+it.cat+'</span></td><td><span class="badge-type">'+it.unit+'</span></td><td style="font-size:12px">'+it.perCtn+' '+it.unit+'</td>'+
    (showStock
      ?'<td>'+(it.exp?(es?'<span class="pill '+es.c+'" style="font-size:10px;padding:2px 7px">'+es.t+'</span>':it.exp):'<span style="color:#bbb;font-size:12px">-</span>')+'</td><td><input type="number" min="0" value="'+(STOCK[it.sku]||0)+'" onchange="setStock(\''+it.sku+'\',this.value)" style="width:74px;padding:5px 7px;border:1.5px solid var(--line);border-radius:7px;font-size:13px"> '+it.unit+'</td>'
      :'<td><span class="badge-type">'+it.type+'</span></td>')+'</tr>';});
  html+='</tbody></table>';if(!list.length)html='<div class="empty">Tiada item.</div>';
  document.getElementById('catScroll').innerHTML=html;}

  var html='<div class="doc-meta"><div><b>Klinik:</b> '+cl+'</div><div><b>Baki Hutang:</b> '+fmtRM(bal)+'</div></div>'+
    '<div style="margin-bottom:12px"><label style="font-size:12px;font-weight:600;font-family:Sora">Amaun Bayaran (RM)</label><input type="number" min="0" step="0.01" id="payAmt" placeholder="0.00" style="width:100%;padding:11px;border:1.5px solid var(--line);border-radius:9px"></div>'+
    '<div style="margin-bottom:12px"><label style="font-size:12px;font-weight:600;font-family:Sora">Nota (cth: resit, cek no.)</label><input id="payNote" placeholder="Pilihan" style="width:100%;padding:11px;border:1.5px solid var(--line);border-radius:9px"></div>'+
    '<div style="display:flex;justify-content:flex-end;gap:10px;margin-top:8px"><button class="btn btn-ghost" style="width:auto" onclick="closeModal()">Batal</button><button class="btn btn-primary" style="width:auto" onclick="savePay(\''+cl+'\')">Simpan Bayaran</button></div>';
  showModal('Rekod Bayaran — '+cl,html);}
async function savePay(cl){var amt=parseFloat((document.getElementById('payAmt')||{}).value)||0;if(amt<=0){toast('Masukkan amaun sah');return;}
  var note=(document.getElementById('payNote')||{}).value||'';
  if(!PAYMENTS[cl])PAYMENTS[cl]=[];PAYMENTS[cl].push({amt:amt,date:today(),note:note});
  await savePayments();closeModal();toast('✓ Bayaran '+fmtRM(amt)+' direkod untuk '+cl);renderPusat();}

// ===== SHOP (katalog + add to cart) =====
let shopSort='cat',shopSearch='';
function renderShop(){const b=document.getElementById('tabbody');
  b.innerHTML='<div class="card"><div class="card-h"><h3>Shop <span class="count-tag">('+CATALOG.length+' item)</span></h3>'+
    '<div class="filters"><input placeholder="Cari nama/kod..." value="'+shopSearch+'" oninput="shopSearch=this.value;shopPage=1;drawShop()" style="min-width:200px">'+
    '<select onchange="shopSort=this.value;shopPage=1;drawShop()"><option value="cat"'+(shopSort==="cat"?" selected":"")+'>Kategori</option><option value="type"'+(shopSort==="type"?" selected":"")+'>Item Type</option><option value="name"'+(shopSort==="name"?" selected":"")+'>Nama</option></select></div></div>'+
    '<div class="scroll-area" id="shopScroll"></div>'+
    '<div class="shop-pager" id="shopPager"></div></div>';drawShop();}
var shopPage=1,SHOP_PER=50;
function drawShop(){let list=CATALOG.slice();
  if(shopSearch.trim()){var q=shopSearch.toLowerCase();list=list.filter(c=>c.name.toLowerCase().includes(q)||c.sku.toLowerCase().includes(q)||c.cat.toLowerCase().includes(q));}
  var keys=shopSort==='cat'?['cat','name']:shopSort==='type'?['type','name']:['name'];
  list.sort((a,b)=>{for(var k of keys){var c=(a[k]||'').localeCompare(b[k]||'','ms');if(c)return c;}return 0;});
  var totalPages=Math.max(1,Math.ceil(list.length/SHOP_PER));
  if(shopPage>totalPages)shopPage=totalPages;if(shopPage<1)shopPage=1;
  var start=(shopPage-1)*SHOP_PER;var pageItems=list.slice(start,start+SHOP_PER);
  var grouped=shopSort!=='name';var lastGrp=null,html='<table><tbody>';
  pageItems.forEach(it=>{if(grouped){var g=shopSort==='cat'?it.cat:it.type;if(g!==lastGrp){html+='<tr class="grp-head"><td colspan="3">'+g+'</td></tr>';lastGrp=g;}}
    var ss=stockStatus(it.sku);var inCart=!!CART[it.sku];var thumb=itemImg(it.sku);
    html+='<tr><td style="width:55%"><div style="display:flex;align-items:center;gap:10px">'+
      (thumb?'<img src="'+thumb+'" style="width:42px;height:42px;object-fit:cover;border-radius:8px;flex-shrink:0">':'<div style="width:42px;height:42px;border-radius:8px;background:#f0f2f7;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0">💊</div>')+
      '<div><b>'+it.name+'</b><br><small style="color:var(--grey)">'+it.sku+' · per '+it.unit+' <span class="pill '+ss.c+'" style="font-size:9px;padding:1px 6px;margin-left:3px">'+ss.t+'</span></small></div></div></td>'+
      '<td style="text-align:right;white-space:nowrap"><b style="color:var(--navy);font-family:Sora">'+(hargaKlinik(it.sku)>0?fmtRM(hargaKlinik(it.sku)):'-')+'</b><br><small style="color:var(--grey);font-size:10px">/'+it.unit+'</small></td>'+
      '<td style="text-align:right;width:120px">'+(inCart?'<button class="act-btn act-hantar" onclick="addCartShop(\''+it.sku+'\')">✓ Dalam Troli</button>':'<button class="btn btn-primary" style="width:auto;padding:7px 13px" onclick="addCartShop(\''+it.sku+'\')">+ Troli</button>')+'</td></tr>';});
  html+='</tbody></table>';if(!list.length)html='<div class="empty">Tiada item padan carian.</div>';
  document.getElementById('shopScroll').innerHTML=html;
  // pagination bar
  var pg=document.getElementById('shopPager');if(pg){
    if(list.length<=SHOP_PER){pg.innerHTML='<span class="count-tag">'+list.length+' item</span>';}
    else{
      var from=start+1,to=Math.min(start+SHOP_PER,list.length);
      var nums='';var win=2;
      for(var p=1;p<=totalPages;p++){
        if(p===1||p===totalPages||(p>=shopPage-win&&p<=shopPage+win)){nums+='<button class="pgnum '+(p===shopPage?'on':'')+'" onclick="gotoShopPage('+p+')">'+p+'</button>';}
        else if(p===shopPage-win-1||p===shopPage+win+1){nums+='<span style="color:var(--grey);padding:0 2px">…</span>';}
      }
      pg.innerHTML='<span class="count-tag">Item '+from+'–'+to+' drpd '+list.length+'</span>'+
        '<div class="pgbar"><button class="pgnav" '+(shopPage<=1?'disabled':'')+' onclick="gotoShopPage('+(shopPage-1)+')">‹ Sebelum</button>'+nums+'<button class="pgnav" '+(shopPage>=totalPages?'disabled':'')+' onclick="gotoShopPage('+(shopPage+1)+')">Seterus ›</button></div>';
    }
  }
}
function gotoShopPage(p){shopPage=p;drawShop();var sc=document.getElementById('shopScroll');if(sc)sc.scrollTop=0;}
function addCartShop(sku){if(CART[sku]){removeFromCart(sku);}else{addToCart(sku);}drawShop();updateCartBadge();}

// ===== CART (troli + checkout) =====
function renderCart(){const b=document.getElementById('tabbody');var items=Object.values(CART);
  if(!items.length){b.innerHTML='<div class="card"><div class="empty">Troli kosong. Pergi ke 🛍 Shop untuk tambah item.</div></div>';return;}
  var total=0;
  var rows=items.map(function(it){var inf=skuInfo(it.sku);var hk=hargaKlinik(it.sku);var q=parseInt(it.qty)||0;var amt=hk*q;total+=amt;var idc=it.sku.replace(/[^A-Za-z0-9]/g,"");
    return '<div class="mini-row"><div style="flex:1;min-width:0"><div class="mini-name">'+inf.name+'</div><div class="mini-sub">'+it.sku+' · '+(hk>0?fmtRM(hk)+'/'+inf.unit:'harga belum set')+'</div></div>'+
      '<input type="number" min="1" value="'+it.qty+'" oninput="setCartQty(\''+it.sku+'\',this.value);cartTotalLive()" class="mini-qty" id="cq_'+idc+'"><span class="mini-unit">'+inf.unit+'</span>'+
      '<span style="font-family:Sora;font-weight:600;font-size:13px;min-width:80px;text-align:right" id="ca_'+idc+'">'+fmtRM(amt)+'</span>'+
      '<button class="mini-x" onclick="rmCart(\''+it.sku+'\')">×</button></div>';}).join('');
  b.innerHTML='<div class="card"><div class="card-h"><h3>Troli Anda — '+items.length+' item</h3></div>'+
    '<div style="padding:14px 20px">'+rows+'</div>'+
    '<div style="padding:16px 20px;border-top:1px solid var(--line);display:flex;justify-content:space-between;align-items:center">'+
      '<div style="font-family:Sora;font-weight:700;font-size:16px">Jumlah Anggaran: <span id="cartGrand" style="color:var(--navy)">'+fmtRM(total)+'</span></div>'+
      '<button class="btn btn-primary" style="width:auto" onclick="checkoutCart()">Checkout & Hantar Order</button></div>'+
    '<div style="padding:0 20px 16px"><label style="font-size:12px;font-weight:600;font-family:Sora">Nota (pilihan)</label><textarea id="cartNote" style="width:100%;padding:10px;border:1.5px solid var(--line);border-radius:9px;min-height:50px" placeholder="cth: perlu segera"></textarea></div></div>';}
function cartTotalLive(){var items=Object.values(CART);var total=0;items.forEach(function(it){var hk=hargaKlinik(it.sku);var q=parseInt(it.qty)||0;var amt=hk*q;total+=amt;var idc=it.sku.replace(/[^A-Za-z0-9]/g,"");var el=document.getElementById('ca_'+idc);if(el)el.textContent=fmtRM(amt);});var g=document.getElementById('cartGrand');if(g)g.textContent=fmtRM(total);}
function rmCart(sku){removeFromCart(sku);renderKlinik();}
async function checkoutCart(){var items=Object.values(CART).filter(function(i){return i.qty&&String(i.qty).trim();}).map(function(i){return {sku:i.sku,qty:i.qty};});
  if(!items.length){toast('Troli kosong');return;}
  try{var r=await STORE.get(KEY);DATA=r?JSON.parse(r):[];}catch(e){}
  var note=(document.getElementById('cartNote')||{}).value||'';
  DATA.push({id:uid('SO'),clinic:session.clinic,by:session.name,date:today(),time:nowt(),need:today(),note:note,items:items,status:'baru'});
  await saveData();CART={};updateCartBadge();toast('✓ Order dihantar ke Pusat');curTab='masuk';renderKlinik();}

let fSel={},formItems=[],formSort='cat',formSearch='',editId=null;
function renderForm(){const b=document.getElementById('tabbody');const editing=!!editId;
  b.innerHTML='<div class="card"><div class="card-h"><h3>'+(editing?'Edit Order '+editId:'Buat Order Baru')+'</h3></div><div class="form-grid">'+
   '<div class="full"><label style="font-size:12px;font-weight:600;font-family:Sora">Tarikh Perlu</label><input type="date" id="fNeed" value="'+today()+'"></div>'+
   '<div class="full"><label style="font-size:12px;font-weight:600;font-family:Sora">Pilih Item ('+CATALOG.length+' dalam katalog)</label>'+
   '<div class="filters" style="margin-bottom:6px"><input placeholder="Cari item..." oninput="formSearch=this.value;drawCatPick()" style="flex:1;min-width:160px;padding:10px 13px;border:1.5px solid var(--line);border-radius:10px">'+
   '<select onchange="formSort=this.value;drawCatPick()" style="padding:9px 11px;border:1.5px solid var(--line);border-radius:9px"><option value="cat">Kategori</option><option value="type">Item Type</option><option value="name">Nama</option></select></div>'+
   '<div class="catalog-pick" id="catList"></div></div>'+
   '<div class="full"><label style="font-size:12px;font-weight:600;font-family:Sora">Item Dipilih + Kuantiti</label><div id="itemList"></div></div>'+
   '<div class="full"><label style="font-size:12px;font-weight:600;font-family:Sora">Nota</label><textarea id="fNote" placeholder="cth: perlu segera"></textarea></div></div>'+
   '<div class="form-foot"><button class="btn btn-ghost" onclick="cancelEdit()">Batal</button><button class="btn btn-primary" style="width:auto" onclick="submitReq()">'+(editing?'Simpan Perubahan':'Hantar Order')+'</button></div></div>';
  drawCatPick();drawItems();}
function cancelEdit(){editId=null;fSel={};formItems=[];setTab('masuk');}
function drawCatPick(){let list=CATALOG.slice();
  if(formSearch.trim()){const q=formSearch.toLowerCase();list=list.filter(c=>c.name.toLowerCase().includes(q)||c.sku.toLowerCase().includes(q)||c.cat.toLowerCase().includes(q));}
  const keys=formSort==='cat'?['cat','name']:formSort==='type'?['type','name']:['name'];
  list.sort((a,b)=>{for(const k of keys){const c=(a[k]||'').localeCompare(b[k]||'','ms');if(c)return c;}return 0;});
  const grouped=formSort!=='name';let lastGrp=null,html='';
  list.slice(0,400).forEach(c=>{if(grouped){const g=formSort==='cat'?c.cat:c.type;if(g!==lastGrp){html+='<div style="padding:6px 13px;background:var(--navy-l);font-size:11px;font-weight:700;font-family:Sora;color:var(--navy);text-transform:uppercase">'+g+'</div>';lastGrp=g;}}
    var ss=stockStatus(c.sku);
    var notif=!ss.ok?'<button class="act-btn" style="background:var(--orange-l);color:#9a5912;margin:0" onclick="event.stopPropagation();notifyMe(\''+c.sku+'\')">🔔 Notify Me</button>':'';
    html+='<div class="cat-item" onclick="toggleCat(\''+c.sku+'\')"><span style="flex:1"><input type="checkbox" class="chk" '+(fSel[c.sku]?'checked':'')+' onclick="event.stopPropagation();toggleCat(\''+c.sku+'\')"> '+c.name+' <small>'+c.sku+' · '+c.type+'</small></span><span style="display:flex;align-items:center;gap:6px"><span class="pill '+ss.c+'" style="font-size:10px;padding:2px 8px">'+ss.t+'</span>'+notif+'</span></div>';});
  if(list.length>400)html+='<div style="padding:9px 13px;color:var(--grey);font-size:12px">… '+(list.length-400)+' lagi. Guna carian.</div>';
  document.getElementById('catList').innerHTML=html||'<div class="empty">Tiada item.</div>';}
async function notifyMe(sku){
  try{const r=await STORE.get('bp_v3_notify');var n=r?JSON.parse(r):{};}catch(e){var n={};}
  var key=session.clinic+'|'+sku;n[key]={clinic:session.clinic,sku:sku,by:session.name,date:today()};
  await STORE.set('bp_v3_notify',JSON.stringify(n));
  toast('🔔 Kami akan maklum bila '+skuInfo(sku).name+' ada stok');
}
function toggleCat(sku){if(fSel[sku])delete fSel[sku];else fSel[sku]={sku,qty:'1'};formItems=Object.values(fSel);drawItems();drawCatPick();}
function drawItems(){const el=document.getElementById('itemList');if(!el)return;
  if(!formItems.length){el.innerHTML='<p style="color:var(--grey);font-size:13px;padding:6px 0">Belum pilih item.</p>';return;}
  el.innerHTML='<div class="mini-cart">'+formItems.map(it=>{const inf=skuInfo(it.sku);var ss=stockStatus(it.sku);
    return '<div class="mini-row"><div style="flex:1;min-width:0"><div class="mini-name">'+inf.name+'</div><div class="mini-sub">'+it.sku+' · per '+inf.unit+' <span class="pill '+ss.c+'" style="font-size:9px;padding:1px 6px;margin-left:3px">'+ss.t+'</span></div></div>'+
    '<input placeholder="Qty" value="'+it.qty+'" oninput="updQty(\''+it.sku+'\',this.value)" class="mini-qty"><span class="mini-unit">'+inf.unit+'</span>'+
    '<button class="mini-x" onclick="toggleCat(\''+it.sku+'\')">×</button></div>';}).join('')+'</div>';}
function updQty(sku,v){if(fSel[sku])fSel[sku].qty=v;}
async function submitReq(){const items=formItems.filter(i=>i.qty&&String(i.qty).trim()).map(i=>({sku:i.sku,qty:i.qty}));if(!items.length){toast('Sila pilih sekurangnya satu item');return;}
  // re-read latest so we never overwrite other sessions' data
  try{const r=await STORE.get(KEY);DATA=r?JSON.parse(r):[];}catch(e){}
  if(editId){
    const o=DATA.find(x=>x.id===editId);
    if(!o||o.status!=='baru'){toast('Order ni dah diproses, tak boleh edit');editId=null;curTab='masuk';render();return;}
    o.items=items;o.need=document.getElementById('fNeed').value;o.note=document.getElementById('fNote').value;o.time=nowt();
    await saveData();editId=null;fSel={};formItems=[];curTab='masuk';render();toast('✓ Order dikemaskini');return;
  }
  DATA.push({id:uid('SO'),clinic:session.clinic,by:session.name,date:today(),time:nowt(),need:document.getElementById('fNeed').value,note:document.getElementById('fNote').value,items:items,status:'baru'});
  await saveData();
  let ok=false;try{const chk=await STORE.get(KEY);ok=chk&&JSON.parse(chk).length===DATA.length;}catch(e){}
  fSel={};formItems=[];curTab='masuk';render();
  toast(ok?'✓ Order dihantar ke Pusat ('+DATA.length+' rekod)':'⚠ Order disimpan, sila semak');}
function setTab(t){curTab=t;if(t==='baru'&&!editId){fSel={};formItems=[];formSearch='';}render();}

/* ============ PUSAT (HQ) ============ */
let fClinic='all';
function renderPusat(){
  const baru=DATA.filter(x=>x.status==='baru');
  const proses=DATA.filter(x=>x.status==='proses');
  const boCount=DATA.reduce((a,o)=>a+((o.backorder||[]).length),0);
  document.getElementById('content').innerHTML=
   '<div class="page-head"><h2>Dashboard Pusat — OrcaHub</h2><p>Order masuk auto pop-up. Proses → INV+DO → mod picking (scan).</p></div>'+
   '<div class="kpis"><div class="kpi o"><div class="lbl">Order Baru</div><div class="val">'+baru.length+'</div></div>'+
   '<div class="kpi n"><div class="lbl">Sedang Proses</div><div class="val">'+proses.length+'</div></div>'+
   '<div class="kpi r"><div class="lbl">Back Order</div><div class="val">'+boCount+'</div></div>'+
   '<div class="kpi g"><div class="lbl">Siap</div><div class="val">'+DATA.filter(x=>x.status==="siap").length+'</div></div></div>'+
   (expSoonCount()>0?'<div style="background:var(--orange-l);border:1px solid var(--orange);border-radius:11px;padding:11px 16px;margin-bottom:16px;font-size:13px;color:#9a5912"><b>⚠ '+expSoonCount()+' item</b> hampir/sudah luput. Semak di tab ⚙ Tetapan Item.</div>':'')+
   '<div id="tabbody"></div>';
  if(curTab==='catalog')renderCatalog(true);
  else if(curTab==='lapor')renderLaporan();
  else if(curTab==='statement')renderStatementHQ();
  else if(curTab==='notify')renderNotify();
  else if(curTab==='uom')renderUOM();
  else if(curTab==='po')renderPO();
  else if(curTab==='grn')renderGRN();
  else if(curTab==='stocktake')renderStockTake();
  else if(curTab==='proses')renderProses();
  else if(curTab==='backorder')renderBackorder();
  else if(curTab==='siap')renderSiap();
  else renderOrders();}
function clinicFilter(){return '<div class="filters"><select onchange="fClinic=this.value;renderPusat()"><option value="all">Semua Klinik</option>'+CLINICS.map(c=>'<option value="'+c+'"'+(fClinic===c?' selected':'')+'>'+c+'</option>').join('')+'</select></div>';}
function applyCF(arr){return fClinic==='all'?arr:arr.filter(x=>x.clinic===fClinic);}
function renderOrders(){let d=applyCF(DATA.filter(x=>x.status==='baru'));const b=document.getElementById('tabbody');
  if(!d.length){b.innerHTML='<div class="card"><div class="card-h"><h3>Order Masuk</h3>'+clinicFilter()+'</div><div class="empty">Tiada order baru.</div></div>';return;}
  let rows=d.slice().reverse().map(x=>'<tr><td><b>'+x.id+'</b><br><span style="font-size:12px;color:var(--grey)">'+x.date+' '+(x.time||'')+'</span></td>'+
    '<td><span class="badge-mini">'+x.clinic+'</span><br><span style="font-size:12px;color:var(--grey)">'+x.by+'</span></td>'+
    '<td class="count-tag">'+x.items.length+' item'+(x.note?'<br><i style="font-size:12px">📝 '+x.note+'</i>':'')+'</td>'+
    '<td><button class="act-btn act-proses" onclick="openProcess(\''+x.id+'\')">Proses Order</button></td></tr>').join('');
  b.innerHTML='<div class="card"><div class="card-h"><h3>Order Masuk</h3>'+clinicFilter()+'</div><div class="scroll-area"><table><thead><tr><th>No Order</th><th>Klinik</th><th>Ringkasan</th><th>Tindakan</th></tr></thead><tbody>'+rows+'</tbody></table></div></div>';}
function renderProses(){let d=applyCF(DATA.filter(x=>x.status==='proses'));const b=document.getElementById('tabbody');
  if(!d.length){b.innerHTML='<div class="card"><div class="card-h"><h3>Sedang Proses</h3>'+clinicFilter()+'</div><div class="empty">Tiada order sedang diproses.</div></div>';return;}
  let rows=d.slice().reverse().map(x=>{const picked=(x.items||[]).filter(i=>i.picked).length;const tot=(x.items||[]).filter(i=>!i.bo).length;
    return '<tr><td><b>'+x.inv+'</b> / '+x.do+'<br><span style="font-size:12px;color:var(--grey)">'+x.id+'</span></td>'+
    '<td><span class="badge-mini">'+x.clinic+'</span></td>'+
    '<td>Picking: <b>'+picked+'/'+tot+'</b>'+((x.backorder&&x.backorder.length)?' <span class="bo-tag">'+x.backorder.length+' back order</span>':'')+'</td>'+
    '<td><button class="act-btn act-proses" onclick="openPicking(\''+x.id+'\')">📷 Mod Picking</button><button class="act-btn act-view" onclick="openDoc(\''+x.id+'\')">Lihat INV/DO</button></td></tr>';}).join('');
  b.innerHTML='<div class="card"><div class="card-h"><h3>Sedang Proses</h3>'+clinicFilter()+'</div><div class="scroll-area"><table><thead><tr><th>INV / DO</th><th>Klinik</th><th>Progress Picking</th><th>Tindakan</th></tr></thead><tbody>'+rows+'</tbody></table></div></div>';}
function renderSiap(){let d=applyCF(DATA.filter(x=>x.status==='siap'));const b=document.getElementById('tabbody');
  if(!d.length){b.innerHTML='<div class="card"><div class="card-h"><h3>Siap</h3>'+clinicFilter()+'</div><div class="empty">Belum ada order siap.</div></div>';return;}
  let rows=d.slice().reverse().map(x=>'<tr><td><b>'+x.inv+'</b> / '+x.do+'</td><td><span class="badge-mini">'+x.clinic+'</span></td><td>'+x.date+' '+(x.time||'')+'</td><td><button class="act-btn act-view" onclick="openDoc(\''+x.id+'\')">Lihat / Print</button></td></tr>').join('');
  b.innerHTML='<div class="card"><div class="card-h"><h3>Order Siap</h3>'+clinicFilter()+'</div><div class="scroll-area"><table><thead><tr><th>INV / DO</th><th>Klinik</th><th>Tarikh</th><th></th></tr></thead><tbody>'+rows+'</tbody></table></div></div>';}
let boView='item';
function renderBackorder(){const b=document.getElementById('tabbody');
  // collect all backorder lines
  const lines=[];applyCF(DATA).forEach(o=>{(o.backorder||[]).forEach(bo=>{lines.push({clinic:o.clinic,sku:bo.sku,qty:parseInt(bo.qty)||0,inv:o.inv,id:o.id});});});
  if(!lines.length){b.innerHTML='<div class="card"><div class="card-h"><h3>Back Order</h3>'+clinicFilter()+'</div><div class="empty">Tiada back order. Semua order dapat dipenuhi.</div></div>';return;}

    inner='<table><thead><tr><th>Klinik</th><th>Item</th><th>Qty Kurang</th><th>Invoice Ref</th></tr></thead><tbody>'+rows+'</tbody></table>';
  }
  b.innerHTML='<div class="card"><div class="card-h"><h3>Back Order — untuk order ke supplier</h3></div><div style="padding:14px 20px 0">'+toggle+'</div><div class="scroll-area" style="padding-top:10px">'+inner+'</div>'+

/* ===== PROCESS: turn order into INV+DO, split back order by stock ===== */
function openProcess(id){const o=DATA.find(x=>x.id===id);if(!o)return;
  let total=0;
  let html='<div class="doc-meta"><div><b>No Order:</b> '+o.id+'</div><div><b>Klinik:</b> '+o.clinic+'</div><div><b>Oleh:</b> '+o.by+'</div><div><b>Tarikh:</b> '+o.date+' '+(o.time||'')+'</div></div>'+
    '<p style="font-size:13px;color:var(--grey);margin-bottom:10px">Item cukup → INV/DO. Tak cukup → Back Order auto. Isi <b>FOC</b> kalau ada qty percuma (tak dikira harga).</p>'+
    '<table style="border:1px solid var(--line);border-radius:10px;overflow:hidden"><thead><tr><th>Item</th><th>Diminta</th><th>Stok</th><th>Hantar</th><th>FOC</th><th>Harga Klinik</th><th>Jumlah</th></tr></thead><tbody>';
  o.items.forEach(it=>{const inf=skuInfo(it.sku);const stk=STOCK[it.sku]||0;const want=parseInt(it.qty)||0;const give=Math.min(stk,want);const shortBO=want-give;
    var hk=hargaKlinik(it.sku);var amt=give*hk;total+=amt;var idc=it.sku.replace(/[^A-Za-z0-9]/g,"");
    html+='<tr><td><b>'+inf.name+'</b><br><small style="color:var(--grey)">'+it.sku+(inf.exp?' · exp '+inf.exp:'')+'</small></td>'+
      '<td>'+it.qty+' '+inf.unit+'</td><td>'+stk+'</td>'+
      '<td><b>'+give+' '+inf.unit+'</b>'+(shortBO>0?'<br><span class="bo-tag">BO '+shortBO+'</span>':'')+'</td>'+
      '<td><input type="number" min="0" max="'+give+'" value="0" id="foc_'+idc+'" style="width:50px;padding:4px 6px;border:1.5px solid var(--line);border-radius:6px;font-size:12px"></td>'+
      '<td>'+fmtRM(hk)+'</td><td>'+fmtRM(amt)+'</td></tr>';});
  html+='</tbody><tfoot><tr><td colspan="6" style="text-align:right;font-weight:700;font-family:Sora">JUMLAH (sebelum FOC)</td><td style="font-weight:700;font-family:Sora">'+fmtRM(total)+'</td></tr></tfoot></table>'+
    '<div style="display:flex;justify-content:flex-end;gap:10px;margin-top:18px"><button class="btn btn-ghost" style="width:auto" onclick="closeModal()">Batal</button><button class="btn btn-primary" style="width:auto" onclick="confirmProcess(\''+id+'\')">Sahkan & Jana INV + DO</button></div>';
  showModal('Proses Order — '+o.id,html);}
async function confirmProcess(id){const o=DATA.find(x=>x.id===id);if(!o)return;
  const newItems=[];const bo=[];
  o.items.forEach(it=>{const stk=STOCK[it.sku]||0;const want=parseInt(it.qty)||0;const give=Math.min(stk,want);const short=want-give;
    var idc=it.sku.replace(/[^A-Za-z0-9]/g,"");var focEl=document.getElementById('foc_'+idc);var foc=focEl?Math.min(parseInt(focEl.value)||0,give):0;
    if(give>0){newItems.push({sku:it.sku,qty:give,foc:foc,price:hargaKlinik(it.sku),exp:(SKUMAP[it.sku]&&SKUMAP[it.sku].exp)||'',picked:false});STOCK[it.sku]=stk-give;}
    if(short>0)bo.push({sku:it.sku,qty:short});});
  o.items=newItems.length?newItems:o.items.map(i=>({sku:i.sku,qty:0,picked:false,bo:true}));
  o.backorder=bo;o.status='proses';o.inv='INV-'+o.id.replace(/^SO-/,'');o.do='DO-'+o.id.replace(/^SO-/,'');
  await saveStock();await saveData();closeModal();toast('✓ '+o.inv+' & '+o.do+' dijana');curTab='proses';renderPusat();}

/* ===== PICKING (scan simulation) ===== */
let pickId=null;
function openPicking(id){pickId=id;drawPicking();}
let _cam=null,_camOn=false;
async function toggleCam(){
  if(_camOn){await stopCam();return;}
  const box=document.getElementById('camBox');if(box)box.style.display='block';
  if(typeof Html5Qrcode==='undefined'){toast('Pustaka kamera tak dapat dimuat (perlu internet)');return;}
  try{
    _cam=new Html5Qrcode('camReader');
    await _cam.start({facingMode:'environment'},{fps:10,qrbox:{width:220,height:140}},
      (decoded)=>{onCamScan(decoded);},
      ()=>{});
    _camOn=true;
  }catch(e){toast('❌ Kamera tak dapat dibuka. Pastikan benarkan akses & guna https/localhost.');}
}
async function stopCam(){try{if(_cam&&_camOn){await _cam.stop();await _cam.clear();}}catch(e){}_camOn=false;_cam=null;const box=document.getElementById('camBox');if(box)box.style.display='none';}
let _lastScan=0;
function onCamScan(code){const now=Date.now();if(now-_lastScan<1200)return;_lastScan=now;scanItem(code);}

function drawPicking(){const o=DATA.find(x=>x.id===pickId);if(!o)return;
  const items=o.items.filter(i=>!i.bo);
  const done=items.filter(i=>i.picked).length;
  let rows=items.map(it=>{const inf=skuInfo(it.sku);
    const got=(it.gotQty!=null?it.gotQty:it.qty);
    const want=parseInt(it.qty)||0;const g=parseInt(got)||0;const short=want-g;
    let line='';
    if(it.picked){
      line='<small>'+it.sku+' · diminta '+it.qty+' '+inf.unit+' · <b style="color:var(--green)">kutip '+g+' '+inf.unit+'</b>'+(short>0?' · <span style="color:var(--red)">baki '+short+' → back order</span>':'')+'</small>';
    }else{
      line='<small>'+it.sku+' · diminta '+it.qty+' '+inf.unit+' = '+uomBreak(it.sku,it.qty)+'</small>';
    }
    return '<div class="pick-row"><div class="pick-tick '+(it.picked?'tick-on':'tick-off')+'">'+(it.picked?'✓':'·')+'</div>'+
    '<div class="pick-name" style="flex:1"><b>'+inf.name+'</b><br>'+line+'</div>'+
    (it.picked
      ? '<div class="pick-qty pick-done">Dikutip</div><button class="act-btn act-view" style="margin:0" onclick="unpick(\''+it.sku+'\')">Ubah</button>'
      : '<div style="display:flex;align-items:center;gap:6px"><input type="number" min="0" value="'+want+'" id="got_'+it.sku.replace(/[^A-Za-z0-9]/g,"")+'" style="width:64px;padding:6px;border:1.5px solid var(--line);border-radius:8px;font-size:13px;text-align:center"><span style="font-size:11px;color:var(--grey);font-family:Sora;font-weight:600">'+inf.unit+'</span><button class="act-btn act-proses" style="margin:0" onclick="confirmPick(\''+it.sku+'\')">Kutip</button></div>')+
    '</div>';}).join('');
  let simBtns=items.filter(i=>!i.picked).slice(0,6).map(it=>'<button onclick="scanItem(\''+it.sku+'\')">'+it.sku+'</button>').join('');
  let html='<div class="scan-box"><div style="font-size:13px;margin-bottom:10px;font-family:Sora;font-weight:600">📷 Scan kod barcode/QR — guna kamera, scanner gun, atau taip & Enter</div>'+
    '<input id="scanInput" placeholder="Scan / taip kod item..." autocomplete="off" onkeydown="if(event.key===\'Enter\'){scanItem(this.value);this.value=\'\';}">'+
    '<div style="margin-top:10px"><button class="btn btn-orange" style="width:auto;padding:9px 16px" onclick="toggleCam()">📷 Buka Kamera</button></div>'+
    '<div id="camBox" style="margin-top:12px;max-width:320px;margin-left:auto;margin-right:auto;display:none"><div id="camReader" style="width:100%;border-radius:10px;overflow:hidden"></div></div>'+
    '<p>Kamera baca barcode/QR pada produk. Scanner gun pun boleh (ia taip kod auto). Nak kutip kurang? Ubah nombor di senarai bawah & tekan Kutip.</p>'+
    '<div class="scan-sim">'+(simBtns||'<span style="font-size:12px;opacity:.7">Semua dah dikutip ✓</span>')+'</div></div>'+
    '<div style="font-family:Sora;font-weight:700;font-size:14px;margin-bottom:8px">Senarai Kutip — '+done+'/'+items.length+' siap</div>'+rows+
    ((o.backorder&&o.backorder.length)?'<div style="margin-top:14px"><span class="bo-tag">'+o.backorder.length+' item dah di back order (dari proses)</span></div>':'')+
    '<div style="display:flex;justify-content:flex-end;gap:10px;margin-top:18px"><button class="btn btn-ghost" style="width:auto" onclick="closeModal()">Tutup</button>'+
    '<button class="btn btn-primary" style="width:auto;'+(done===items.length&&items.length?'':'opacity:.5;pointer-events:none')+'" onclick="openDoc(\''+pickId+'\')">Double-check & Print →</button></div>';
  showModal('Mod Picking — '+o.inv,html);
  setTimeout(()=>{const si=document.getElementById('scanInput');if(si)si.focus();},100);}
// scan = pick FULL qty
async function scanItem(code){code=(code||'').trim();if(!code)return;const o=DATA.find(x=>x.id===pickId);
  const it=o.items.find(i=>i.sku.toLowerCase()===code.toLowerCase()&&!i.bo);
  if(!it){toast('❌ Kod '+code+' tiada dalam order ni');return;}
  if(it.picked){toast('Item '+code+' dah dikutip');return;}
  await doPick(it,parseInt(it.qty)||0);try{beep();}catch(e){}toast('✓ '+skuInfo(it.sku).name+' dikutip penuh');drawPicking();}
// manual pick with editable qty
async function confirmPick(sku){const o=DATA.find(x=>x.id===pickId);const it=o.items.find(i=>i.sku===sku&&!i.bo);if(!it)return;
  const el=document.getElementById('got_'+sku.replace(/[^A-Za-z0-9]/g,""));
  let g=parseInt(el?el.value:it.qty);if(isNaN(g)||g<0)g=0;
  const want=parseInt(it.qty)||0;
  if(g>want){toast('Tak boleh kutip lebih dari diminta ('+want+')');return;}
  await doPick(it,g);try{beep();}catch(e){}
  toast(g<want?('✓ Kutip '+g+' · baki '+(want-g)+' → back order'):'✓ '+skuInfo(it.sku).name+' dikutip penuh');
  drawPicking();}
// core: record picked qty, push shortfall to backorder, return stock for shortfall
async function doPick(it,got){const o=DATA.find(x=>x.id===pickId);const want=parseInt(it.qty)||0;const short=want-got;
  it.picked=true;it.gotQty=got;
  if(short>0){
    o.backorder=o.backorder||[];
    // merge if same sku already in backorder
    const ex=o.backorder.find(b=>b.sku===it.sku);
    if(ex)ex.qty=(parseInt(ex.qty)||0)+short;else o.backorder.push({sku:it.sku,qty:short});
    // return unused stock back to HQ (we deducted full want at process time)
    STOCK[it.sku]=(STOCK[it.sku]||0)+short;await saveStock();
  }
  await saveData();}
// allow re-edit a picked line
async function unpick(sku){const o=DATA.find(x=>x.id===pickId);const it=o.items.find(i=>i.sku===sku&&!i.bo);if(!it)return;
  // reverse any backorder + stock we added for this line
  const want=parseInt(it.qty)||0;const got=(it.gotQty!=null?it.gotQty:want);const short=want-got;
  if(short>0&&o.backorder){const ex=o.backorder.find(b=>b.sku===it.sku);if(ex){ex.qty=(parseInt(ex.qty)||0)-short;if(ex.qty<=0)o.backorder=o.backorder.filter(b=>b.sku!==it.sku);}STOCK[it.sku]=(STOCK[it.sku]||0)-short;await saveStock();}
  it.picked=false;it.gotQty=null;await saveData();drawPicking();}

/* ===== DOC view (INV/DO) + print ===== */
let docCat=false,docId=null;
function buildDocRows(o,sepCat){const items=o.items.filter(i=>!i.bo);let total=0;
  function rowHtml(it,n){const inf=skuInfo(it.sku);const deliver=(it.gotQty!=null?it.gotQty:it.qty);
    var foc=it.foc||0;var bil=deliver-foc;var price=(it.price!=null?it.price:hargaKlinik(it.sku));var amt=bil*price;total+=amt;
    return '<tr><td>'+n+'</td><td>'+inf.sku+'</td><td>'+inf.name+(foc>0?' <span style="color:#1e8449;font-size:11px">+ '+foc+' FOC</span>':'')+'</td><td>'+(it.exp||inf.exp||'-')+'</td><td>'+deliver+' '+inf.unit+(String(deliver)!==String(it.qty)?'<br><small style="color:#888">(diminta '+it.qty+')</small>':'')+'</td><td>'+fmtRM(price)+'</td><td>'+fmtRM(amt)+'</td></tr>';}
  let body='';
  if(sepCat){const groups={};items.forEach(it=>{const c=skuInfo(it.sku).cat||'LAIN-LAIN';(groups[c]=groups[c]||[]).push(it);});
    Object.keys(groups).sort((a,b)=>a.localeCompare(b,'ms')).forEach(c=>{body+='<tr><td colspan="7" style="background:#eef1f6;font-weight:700;font-family:Sora;font-size:12px">'+c+'</td></tr>';let n=1;groups[c].forEach(it=>{body+=rowHtml(it,n++);});});
  }else{let n=1;items.forEach(it=>{body+=rowHtml(it,n++);});}
  return {body:body,total:total};
}

    '<table style="border:1px solid var(--line)"><thead><tr><th>#</th><th>Kod</th><th>Item</th><th>Expired</th><th>Qty</th><th>Harga</th><th>Jumlah</th></tr></thead><tbody>'+built.body+'</tbody>'+
    '<tfoot><tr><td colspan="6" style="text-align:right;font-weight:700">JUMLAH</td><td style="font-weight:700">'+fmtRM(built.total)+'</td></tr></tfoot></table>'+

    '<div style="display:flex;justify-content:space-between;margin-top:24px;gap:20px">'+
    '<div style="flex:1;border-top:1px solid #999;padding-top:6px;font-size:12px">Received by (Klinik):<br><br>Nama & Tandatangan</div>'+
    '<div style="flex:1;border-top:1px solid #999;padding-top:6px;font-size:12px">Checked by (HQ):<br><br>Nama & Tandatangan</div></div>'+
    '</div><div style="display:flex;justify-content:flex-end;gap:10px;margin-top:18px">'+
    (o.status==='proses'?'<button class="btn btn-orange" style="width:auto" onclick="markSiap(\''+id+'\')">Tandai Siap/Dihantar</button>':'')+
    '<button class="btn btn-primary" style="width:auto" onclick="printDoc()">🖨 Print INV/DO</button></div>';
  showModal('INV / DO — '+o.clinic,html);}
// EDIT INV: ubah qty hantar & harga setiap item (kalau salah order)
function editInv(id){const o=DATA.find(x=>x.id===id);if(!o)return;const items=o.items.filter(i=>!i.bo);

// ===== INVOIS PROFESIONAL =====
function buildInvoiceHTML(o,opts){opts=opts||{};var sepCat=!!opts.sepCat;
  var items=o.items.filter(function(i){return !i.bo;});

// ===== GAMBAR ITEM =====
function uploadItemImg(sku,input){
  var f=input.files&&input.files[0];if(!f)return;
  if(f.size>8*1024*1024){toast('Gambar terlalu besar (max 8MB)');return;}
  var reader=new FileReader();
  reader.onload=function(e){
    var img=new Image();
    img.onload=async function(){
      // resize ke max 400px, simpan jpeg
      var max=400;var w=img.width,h=img.height;
      if(w>h&&w>max){h=Math.round(h*max/w);w=max;}else if(h>max){w=Math.round(w*max/h);h=max;}
      var cv=document.createElement('canvas');cv.width=w;cv.height=h;
      cv.getContext('2d').drawImage(img,0,0,w,h);
      var data=cv.toDataURL('image/jpeg',0.78);
      ITEMIMG[sku]=data;await saveImg();
      var idc=sku.replace(/[^A-Za-z0-9]/g,"");var box=document.getElementById('im_'+idc);
      toast('✓ Gambar disimpan');drawUOM();
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(f);
}
async function clearItemImg(sku){delete ITEMIMG[sku];await saveImg();toast('Gambar dibuang');drawUOM();}

// ===== EXPORT GRN -> AutoCount Purchase Import (Header + Detail CSV) =====
function csvCell(v){v=(v==null?'':String(v));if(/[",\n]/.test(v))v='"'+v.replace(/"/g,'""')+'"';return v;}
function supplierCode(name){
  // cuba padan kod creditor AutoCount dari nama; jika gagal, kosong (account team isi mapping)
  var map=(typeof CREDITOR_CODES!=='undefined')?CREDITOR_CODES:{};
  if(map[name])return map[name];
  return '';
}
function buildGRNcsv(list){
  // HEADER: satu baris per GRN
  var headers='DocNo,DocDate,CreditorCode,CreditorName,Description,Terms\n';
  var hRows=list.map(function(g){
    return [g.no,fmtDate(g.date),supplierCode(g.supplier),g.supplier,(g.note||'Goods Received'),'Net 30 days'].map(csvCell).join(',');
  }).join('\n');
  // DETAIL: satu baris per item
  var details='DocNo,ItemCode,Description,UOM,Qty,UnitPrice,Discount,SubTotal\n';
  var dRows=[];
  list.forEach(function(g){(g.items||[]).forEach(function(it){
    var inf=skuInfo(it.sku);var qty=parseInt(it.recvQty)||0;var price=parseFloat(it.cost)||0;var sub=qty*price;
    dRows.push([g.no,it.sku,inf.name,(inf.unit||'BOX'),qty,price.toFixed(4),'0.00',sub.toFixed(2)].map(csvCell).join(','));
  });});
  return {header:headers+hRows,detail:details+dRows.join('\n')};
}
function downloadCSV(filename,content){
  try{
    var blob=new Blob(['\ufeff'+content],{type:'text/csv;charset=utf-8;'});
    var url=URL.createObjectURL(blob);
    var a=document.createElement('a');a.href=url;a.download=filename;document.body.appendChild(a);a.click();
    setTimeout(function(){document.body.removeChild(a);URL.revokeObjectURL(url);},100);
  }catch(e){toast('Export gagal: '+e.message);}
}
function exportGRN(id){var g=GRNS.find(function(x){return x.id===id;});if(!g)return;
  var csv=buildGRNcsv([g]);
  downloadCSV(g.no+'_HEADER.csv',csv.header);
  setTimeout(function(){downloadCSV(g.no+'_DETAIL.csv',csv.detail);},400);
  toast('✓ '+g.no+' dieksport (2 fail: HEADER + DETAIL)');}
function exportAllGRN(){if(!GRNS.length){toast('Tiada GRN');return;}
  var csv=buildGRNcsv(GRNS);
  var stamp=today();
  downloadCSV('GRN_AutoCount_HEADER_'+stamp+'.csv',csv.header);
  setTimeout(function(){downloadCSV('GRN_AutoCount_DETAIL_'+stamp+'.csv',csv.detail);},400);
  toast('✓ '+GRNS.length+' GRN dieksport (HEADER + DETAIL)');}

function stkCats(){var set={};CATALOG.forEach(function(c){if(c.cat)set[c.cat]=1;});return Object.keys(set).sort();}
function stkDiff(sku){var phys=stkCount[sku];if(phys===''||phys==null)return null;var sys=STOCK[sku]||0;return (parseInt(phys)||0)-sys;}
function stkSummary(){var counted=0,varItems=0,plus=0,minus=0;
  Object.keys(stkCount).forEach(function(sku){var p=stkCount[sku];if(p===''||p==null)return;counted++;var d=stkDiff(sku);if(d!==0){varItems++;if(d>0)plus+=d;else minus+=Math.abs(d);}});
  return {counted:counted,varItems:varItems,plus:plus,minus:minus};}
function renderStockTake(){const b=document.getElementById('tabbody');

    '<div class="kpi n"><div class="lbl">Item Dikira</div><div class="val">'+s.counted+'</div></div>'+

    '<div class="kpi g"><div class="lbl">Lebih (+)</div><div class="val">'+s.plus+'</div></div>'+

    (s.counted>0?'<button class="btn btn-ghost" style="width:auto;padding:8px 13px;color:var(--navy)" onclick="exportStkVariance()">⤓ Export Variance</button>':'')+
    (s.counted>0?'<button class="btn btn-ghost" style="width:auto;padding:8px 13px;color:var(--red)" onclick="resetStk()">↺ Reset</button>':'')+
    (s.counted>0?'<button class="btn btn-primary" style="width:auto;padding:8px 16px" onclick="finalizeStk()">✓ Finalize & Adjust</button>':'')+

    '<div style="padding:12px 20px;display:flex;gap:10px;flex-wrap:wrap">'+
    '<input placeholder="Cari item / SKU..." value="'+stkSearch+'" oninput="stkSearch=this.value;drawStkList()" style="flex:1;min-width:200px;padding:9px 12px;border:1.5px solid var(--line);border-radius:9px">'+
    '<select onchange="stkCat=this.value;drawStkList()" style="padding:9px 12px;border:1.5px solid var(--line);border-radius:9px">'+catOpts+'</select></div>'+
    '<div style="padding:0 20px 10px;font-size:12px;color:var(--grey)">Taip kuantiti sebenar yang dikira. Kosong = belum dikira (takkan diadjust). Finalize akan update stok sistem + simpan rekod.</div>'+
    '<div class="scroll-area" id="stkList"></div></div>';

function drawStkList(){var el=document.getElementById('stkList');if(!el)return;
  var list=CATALOG.slice();

  list.slice(0,500).forEach(function(it){if(it.cat!==lastGrp){html+='<tr class="grp-head"><td colspan="5">'+it.cat+'</td></tr>';lastGrp=it.cat;}

function setStkCount(sku,v){if(v===''){delete stkCount[sku];}else{stkCount[sku]=v;}
  var idc=sku.replace(/[^A-Za-z0-9]/g,"");var el=document.getElementById('sv_'+idc);
  if(el){var d=stkDiff(sku);el.innerHTML=(d==null)?'<span style="color:#bbb">—</span>':(d===0?'<span class="pill p-siap" style="font-size:10px;padding:2px 8px">✓ Sama</span>':'<span class="pill '+(d>0?'p-baru':'p-bo')+'" style="font-size:10px;padding:2px 8px">'+(d>0?'+':'')+d+'</span>');}}
function resetStk(){if(!confirm('Reset semua kiraan stock take semasa? (rekod yang dah finalize takkan terjejas)'))return;stkCount={};renderPusat();toast('Kiraan direset');}
function stkVarianceLines(){var lines=[];Object.keys(stkCount).forEach(function(sku){var p=stkCount[sku];if(p===''||p==null)return;var sys=STOCK[sku]||0;var phys=parseInt(p)||0;lines.push({sku:sku,sys:sys,phys:phys,diff:phys-sys});});return lines;}
async function finalizeStk(){
  var lines=stkVarianceLines();
  if(!lines.length){toast('Belum ada item dikira');return;}
  var varc=lines.filter(function(l){return l.diff!==0;}).length;
  if(!confirm('Finalize stock take?\n\n'+lines.length+' item dikira, '+varc+' ada variance.\nStok sistem akan diupdate ikut kiraan fizikal.'))return;
  // update stok
  lines.forEach(function(l){STOCK[l.sku]=l.phys;});
  var no='ST-'+new Date().getFullYear()+'-'+String(STAKES.length+1).padStart(4,'0');
  STAKES.push({id:uid('st'),no:no,date:today(),by:session.name,note:'',lines:lines,counted:lines.length,variance:varc});
  await saveStock();await saveStakes();
  stkCount={};
  toast('✓ '+no+' selesai · stok diadjust ('+varc+' variance)');
  stkView='history';renderPusat();
}

function setTheme(t){document.documentElement.setAttribute('data-theme',t);localStorage.setItem('theme',t);const lb=document.getElementById('themeLightBtn');const db=document.getElementById('themeDarkBtn');if(lb&&db){lb.classList.toggle('on',t==='light');db.classList.toggle('on',t==='dark');}const tb=document.getElementById('themeBtn');if(tb)tb.textContent=t==='dark'?'☀️':'🌙';}
function toggleTheme(){const dark=document.documentElement.getAttribute('data-theme')==='dark';setTheme(dark?'light':'dark');}
(function(){const t=localStorage.getItem('theme')||'dark';document.documentElement.setAttribute('data-theme',t);document.addEventListener('DOMContentLoaded',function(){setTheme(t);});})();

</script>
